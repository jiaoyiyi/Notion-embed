<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>独立滑动球面文字</title>
<style>
*{margin:0;padding:0}
body{
  width:100vw;height:100vh;overflow:hidden;
  background: transparent;
}
.word-item{
  position:absolute;
  top:0;left:0;
  user-select:none;
  will-change: transform, opacity;
  cursor: pointer;
}
.word-item a {
  color: inherit;
  text-decoration: none;
}
</style>
</head>
<body>
<script>
// ===================== 可调参数区 =====================
const MAX_DENSITY = 48;        // 最大同时存在文字，控制整体密度
const SPAWN_INTERVAL = 260;    // 新词生成间隔(ms)，越小冒出越快
const WORD_LIFE_FRAME = 4200;  // 单个文字完整存活总帧数
const FADE_STEP = 520;         // 淡入淡出柔和过渡帧数
const SPHERE_RATIO = 0.36;     // 球体大小占屏幕比例
const GLOBAL_SPIN_SPEED = 0.0006; // 整个球体缓慢自转速度
const SELF_SLIDE_SPEED = 0.0012;  // 单个文字独立向左上滑动速度
const CAMERA_DIST = 720;        // 相机透视距离，控制3D立体感
// ======================================================

// 词汇+对应链接
const wordPool = [
  { text:"工作日记", link:"https://app.notion.com/p/6-17-382a880a940580bc8c6ee630e35ddb4c?source=copy_link" },
  { text:"数据库", link:"https://app.notion.com/p/354a880a940580b78ed8e56e47c3e021?v=354a880a9405803cbfc1000c89de1def&source=copy_link" },
];

let winW = window.innerWidth;
let winH = window.innerHeight;
let sphereRadius = Math.min(winW, winH) * SPHERE_RATIO;
let centerX = winW / 2;
let centerY = winH / 2;

let isHoverPause = false;
let globalRotateTheta = 0;
const wordList = [];

class SphereWord {
  constructor(){
    this.el = document.createElement("div");
    this.el.className = "word-item";
    const item = wordPool[Math.floor(Math.random() * wordPool.length)];
    const a = document.createElement("a");
    a.innerText = item.text;
    a.href = item.link;
    a.target = "_blank";
    this.el.appendChild(a);

    // 文字初始球面坐标
    this.baseTheta = Math.random() * Math.PI * 2;
    this.basePhi = Math.random() * Math.PI;

    // 文字样式
    this.fontSize = 13 + Math.random() * 20;
    const r = 20 + Math.floor(Math.random() * 110);
    const g = 50 + Math.floor(Math.random() * 120);
    const b = 160 + Math.floor(Math.random() * 90);
    this.el.style.fontSize = `${this.fontSize}px`;
    this.el.style.color = `rgb(${r},${g},${b})`;

    this.life = 0;
    document.body.appendChild(this.el);
  }

  update(){
    this.life += 1;
    if(isHoverPause) return;

    // 核心：文字自身持续向左上方球面滑动（theta持续递增=向左环绕）
    this.baseTheta += SELF_SLIDE_SPEED;
    // 叠加整个球体全局缓慢自转
    const totalTheta = this.baseTheta + globalRotateTheta;

    // 球面坐标计算，严格贴合球体曲面
    const x = sphereRadius * Math.sin(this.basePhi) * Math.cos(totalTheta);
    const y = sphereRadius * Math.cos(this.basePhi);
    const z = sphereRadius * Math.sin(this.basePhi) * Math.sin(totalTheta);

    // 3D透视投影
    const perspectiveScale = CAMERA_DIST / (CAMERA_DIST + z);
    const screenX = centerX + x * perspectiveScale;
    const screenY = centerY + y * perspectiveScale;
    const depthScale = Math.max(0.3, perspectiveScale);

    // 淡入→常显→淡出完整透明度
    let opacity = 1;
    if(this.life < FADE_STEP){
      opacity = this.life / FADE_STEP;
    } else if(this.life > WORD_LIFE_FRAME - FADE_STEP){
      opacity = (WORD_LIFE_FRAME - this.life) / FADE_STEP;
    }

    this.el.style.transform = `translate(${screenX}px,${screenY}px) scale(${depthScale})`;
    this.el.style.opacity = opacity;

    // 球体区域内才可点击
    const distFromCenter = Math.hypot(screenX - centerX, screenY - centerY);
    const sphereViewRange = sphereRadius * 1.25;
    this.el.style.pointerEvents = distFromCenter < sphereViewRange ? "auto" : "none";
  }

  destroy(){
    this.el.remove();
  }
}

// 新词生成，到达密度上限停止新增
function spawnNewWord(){
  if(wordList.length >= MAX_DENSITY) return;
  wordList.push(new SphereWord());
}
setInterval(spawnNewWord, SPAWN_INTERVAL);

// 鼠标移入球体暂停全部运动
document.addEventListener("mousemove", (e) => {
  const mouseDist = Math.hypot(e.clientX - centerX, e.clientY - centerY);
  isHoverPause = mouseDist < sphereRadius * 1.25;
});

// 主渲染循环
function renderLoop(){
  // 全局球体自转
  if(!isHoverPause){
    globalRotateTheta += GLOBAL_SPIN_SPEED;
  }

  // 遍历更新所有文字，生命周期结束销毁
  for(let i = wordList.length - 1; i >= 0; i--){
    const word = wordList[i];
    word.update();
    if(word.life >= WORD_LIFE_FRAME){
      word.destroy();
      wordList.splice(i, 1);
    }
  }
  requestAnimationFrame(renderLoop);
}
renderLoop();

// 窗口自适应
window.addEventListener("resize", () => {
  winW = window.innerWidth;
  winH = window.innerHeight;
  centerX = winW / 2;
  centerY = winH / 2;
  sphereRadius = Math.min(winW, winH) * SPHERE_RATIO;
})
</script>
</body>
</html>
