<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>球面漂浮文字</title>
<style>
*{margin:0;padding:0}
body{
  width:100vw;height:100vh;overflow:hidden;
  background: transparent;
}
.word-item{
  position:absolute;
  top:0;left:0;
  user-select:none;
  will-change: transform, opacity;
  cursor: pointer;
}
.word-item a {
  color: inherit;
  text-decoration: none;
}
</style>
</head>
<body>
<script>
// 自定义控制参数
const DENSITY = 60;        // 最大文字数量，控制密度
const SPAWN_INTERVAL = 280;// 新词生成间隔ms
const WORD_LIFE = 3500;    // 文字总存活时长
const FADE_DURATION = 450; // 淡入淡出过渡帧数
const SPHERE_SCALE = 0.38; // 球体大小
const ROTATE_SPEED = 0.003;// 球面滑动速度

// 词汇+对应链接
const wordPool = [
  { text:"春风", link:"https://www.baidu.com/s?wd=春风" },
  { text:"落日", link:"https://www.baidu.com/s?wd=落日" },
  { text:"云端", link:"https://www.baidu.com/s?wd=云端" },
  { text:"归途", link:"https://www.baidu.com/s?wd=归途" },
  { text:"初心", link:"https://www.baidu.com/s?wd=初心" },
  { text:"山河", link:"https://www.baidu.com/s?wd=山河" },
  { text:"星辰", link:"https://www.baidu.com/s?wd=星辰" },
  { text:"旷野", link:"https://www.baidu.com/s?wd=旷野" },
  { text:"人间", link:"https://www.baidu.com/s?wd=人间" },
  { text:"烟火", link:"https://www.baidu.com/s?wd=烟火" },
  { text:"破晓", link:"https://www.baidu.com/s?wd=破晓" },
  { text:"远航", link:"https://www.baidu.com/s?wd=远航" },
];

let winW = window.innerWidth;
let winH = window.innerHeight;
let sphereRadius = Math.min(winW, winH) * SPHERE_SCALE;
let centerX = winW / 2;
let centerY = winH / 2;
const cameraZ = 700;
let isPause = false;
const wordList = [];

class SphereWord {
  constructor(){
    this.el = document.createElement("div");
    this.el.className = "word-item";
    const randomItem = wordPool[Math.floor(Math.random() * wordPool.length)];
    const aTag = document.createElement("a");
    aTag.innerText = randomItem.text;
    aTag.href = randomItem.link;
    aTag.target = "_blank";
    this.el.appendChild(aTag);

    this.theta = Math.random() * Math.PI * 2;
    this.phi = Math.random() * Math.PI;
    this.rotSpeed = (Math.random() - 0.5) * ROTATE_SPEED;
    this.phiSpeed = (Math.random() - 0.5) * ROTATE_SPEED * 0.4;

    this.size = 12 + Math.random() * 22;
    const r = 30 + Math.floor(Math.random() * 120);
    const g = 60 + Math.floor(Math.random() * 130);
    const b = 180 + Math.floor(Math.random() * 75);
    this.el.style.fontSize = `${this.size}px`;
    this.el.style.color = `rgb(${r},${g},${b})`;

    this.life = 0;
    document.body.appendChild(this.el);
  }

  update(){
    this.life += 1;
    if(!isPause){
      this.theta += this.rotSpeed;
      this.phi += this.phiSpeed;
    }

    const x = sphereRadius * Math.sin(this.phi) * Math.cos(this.theta);
    const y = sphereRadius * Math.cos(this.phi);
    const z = sphereRadius * Math.sin(this.phi) * Math.sin(this.theta);
    const scale = cameraZ / (cameraZ + z);
    const screenX = centerX + x * scale;
    const screenY = centerY + y * scale;
    const zScale = Math.max(0.35, scale);

    let opacity = 1;
    if(this.life < FADE_DURATION){
      opacity = this.life / FADE_DURATION;
    }else if(this.life > WORD_LIFE - FADE_DURATION){
      opacity = (WORD_LIFE - this.life) / FADE_DURATION;
    }

    this.el.style.transform = `translate(${screenX}px,${screenY}px) scale(${zScale})`;
    this.el.style.opacity = opacity;

    const dx = screenX - centerX;
    const dy = screenY - centerY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const sphereViewRadius = sphereRadius * 1.2;
    this.el.style.pointerEvents = dist < sphereViewRadius ? "auto" : "none";
  }

  destroy(){
    this.el.remove();
  }
}

function spawnWord(){
  if(wordList.length >= DENSITY) return;
  wordList.push(new SphereWord());
}
setInterval(spawnWord, SPAWN_INTERVAL);

document.addEventListener("mousemove", (e)=>{
  const dx = e.clientX - centerX;
  const dy = e.clientY - centerY;
  const mouseDist = Math.sqrt(dx*dx + dy*dy);
  isPause = mouseDist < sphereRadius * 1.2;
});

function loop(){
  for(let i = wordList.length - 1; i >= 0; i--){
    const item = wordList[i];
    item.update();
    if(item.life >= WORD_LIFE){
      item.destroy();
      wordList.splice(i, 1);
    }
  }
  requestAnimationFrame(loop);
}
loop();

window.addEventListener("resize", ()=>{
  winW = window.innerWidth;
  winH = window.innerHeight;
  centerX = winW / 2;
  centerY = winH / 2;
  sphereRadius = Math.min(winW, winH) * SPHERE_SCALE;
})
</script>
</body>
</html>
